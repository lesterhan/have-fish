name: Build Android APK
# Builds a signed release APK entirely on the runner (no EAS/Expo cloud):
# prebuild -> gradle assembleRelease -> attach to a GitHub Release for Obtainium.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v1.2.0) — leave empty to skip creating a GitHub Release"
        required: false
        type: string
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build signed APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # create releases
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/package.json', 'mobile/bun.lock') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: echo "$ANDROID_KEYSTORE_B64" | base64 -d > release.keystore

      - name: Prebuild native project
        run: bunx expo prebuild --platform android --no-install

      - name: Build release APK
        working-directory: mobile/android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -PMYAPP_RELEASE_STORE_FILE="$GITHUB_WORKSPACE/mobile/release.keystore" \
            -PMYAPP_RELEASE_STORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD" \
            -PMYAPP_RELEASE_KEY_ALIAS="$ANDROID_KEY_ALIAS" \
            -PMYAPP_RELEASE_KEY_PASSWORD="$ANDROID_KEY_PASSWORD" \
            -PversionCode=${{ github.run_number }}

      - name: Verify signature
        working-directory: mobile/android
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -r | head -1)
          "$APKSIGNER" verify --print-certs app/build/outputs/apk/release/app-release.apk

      - name: Rename APK
        working-directory: mobile/android
        run: cp app/build/outputs/apk/release/app-release.apk "$GITHUB_WORKSPACE/have-fish.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: have-fish-android
          path: have-fish.apk
          retention-days: 30

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: ${{ steps.tag.outputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: have-fish ${{ steps.tag.outputs.tag }}
          files: have-fish.apk
          generate_release_notes: true
