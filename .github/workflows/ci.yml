name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: havefish
          POSTGRES_PASSWORD: havefish
          POSTGRES_DB: havefish
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://havefish:havefish@localhost:5432/havefish
      TEST_DATABASE_URL: postgres://havefish:havefish@localhost:5432/havefish_test
      BETTER_AUTH_SECRET: ci-secret-not-used-in-tests
      BETTER_AUTH_URL: http://localhost:8887

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Create test database
        run: psql postgres://havefish:havefish@localhost:5432/havefish -c 'CREATE DATABASE havefish_test;'

      - name: Install backend dependencies
        working-directory: backend
        run: bun install

      - name: Run migrations
        working-directory: backend
        run: bun run db:migrate:test

      - name: Run tests
        working-directory: backend
        run: bun test

  frontend:
    runs-on: ubuntu-latest

    # PUBLIC_VERSION is normally injected by the Docker/CI image build from the git SHA;
    # svelte-check needs it present or `$env/static/public` won't export it.
    env:
      PUBLIC_VERSION: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install

      - name: Run tests
        working-directory: frontend
        run: bun test

      - name: Type check
        working-directory: frontend
        run: bun run check
